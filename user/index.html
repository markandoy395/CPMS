<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPMS User Gateway</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="gateway-header">
        <a class="brand-lockup" href="./" aria-label="CPMS User Gateway home">
          <img src="/assets/image/logo.png" alt="CPMS" />
          <span>cpms</span>
        </a>
        <div class="header-actions">
          <div class="notification-wrap">
            <button
              class="notification-button"
              id="notificationButton"
              type="button"
              aria-label="Admin updates"
              aria-expanded="false"
              aria-controls="notificationPanel"
            >
              <svg
                class="notification-icon"
                aria-hidden="true"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  d="M18 8A6 6 0 0 0 6 8c0 7-3 7-3 9h18c0-2-3-2-3-9Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M13.73 21a2 2 0 0 1-3.46 0"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span
                class="notification-badge"
                id="notificationBadge"
                hidden
              ></span>
            </button>
            <div
              class="notification-panel"
              id="notificationPanel"
              role="status"
              hidden
            >
              <div class="notification-panel-head">
                <strong>Admin Updates</strong>
                <span id="notificationCount">0 new</span>
              </div>
              <div class="notification-list" id="notificationList">
                <p>No admin updates yet.</p>
              </div>
            </div>
          </div>
          <div class="profile-chip" aria-label="Current visitor">
            <span class="profile-avatar" id="visitorAvatar">U</span>
            <div>
              <strong id="visitorName">User</strong>
              <small id="visitorRole">Borrower</small>
            </div>
          </div>
        </div>
      </header>

      <section class="content-head">
        <div>
          <h1>Borrow Items</h1>
          <p>Choose from available inventory and submit a borrowing request.</p>
        </div>
      </section>

      <section class="toolbar" aria-label="Inventory filters">
        <label class="search-field">
          <span>Find an item</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Search by name, code, or serial number"
            autocomplete="off"
          />
        </label>
        <label>
          <span>Availability</span>
          <select id="statusFilter">
            <option value="">All statuses</option>
            <option>Active</option>
            <option>Assigned</option>
            <option>Borrowed</option>
            <option>In Repair</option>
            <option>Returned</option>
            <option>Lost</option>
          </select>
        </label>
      </section>

      <section
        class="category-strip"
        id="categoryStrip"
        aria-label="Browse by category"
      >
        <button class="category-chip active" type="button" data-category="">
          All Items
        </button>
      </section>

      <p class="alert" id="messageBox" role="status" hidden></p>

      <section class="items-panel" aria-label="Inventory items">
        <div class="table-heading">
          <div>
            <h2>Borrowable Items</h2>
            <p><span id="itemCount">0 items shown</span></p>
          </div>
          <div class="mini-stats" aria-label="Inventory summary">
            <span><strong id="totalItems">0</strong> total</span>
            <span><strong id="availableItems">0</strong> available</span>
            <span><strong id="borrowedItems">0</strong> borrowed</span>
          </div>
        </div>
        <div class="items-grid" id="itemsGrid">
          <p class="empty-state">Loading inventory...</p>
        </div>
      </section>
    </main>

    <div class="modal" id="requestModal" hidden>
      <div
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="requestTitle"
      >
        <div class="modal-header">
          <div>
            <h2 id="requestTitle">Borrow Request</h2>
          </div>
          <button
            class="icon-button"
            id="closeModalButton"
            type="button"
            aria-label="Close request form"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <path
                d="M18 6 6 18M6 6l12 12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <form id="requestForm">
          <div class="form-grid">
            <label>
              <span>Borrower Name *</span>
              <input
                id="borrowerName"
                name="borrower_name"
                autocomplete="name"
                required
              />
            </label>
            <label>
              <span>Borrower ID / Reference</span>
              <input
                id="borrowerReference"
                name="borrower_reference"
                autocomplete="username"
              />
            </label>
            <label>
              <span>Department / Office</span>
              <input
                id="department"
                name="department"
                autocomplete="organization"
              />
            </label>
            <label>
              <span>Contact Number</span>
              <input
                id="contactNumber"
                name="contact_number"
                type="tel"
                autocomplete="tel"
              />
            </label>
            <label>
              <span>Borrow Date *</span>
              <input
                id="borrowDate"
                name="requested_borrow_date"
                type="date"
                required
              />
            </label>
            <label>
              <span>Borrow Duration (days) *</span>
              <input
                id="borrowDuration"
                name="borrow_duration_days"
                type="number"
                min="1"
                max="365"
                required
              />
            </label>
            <label>
              <span>Due Date *</span>
              <input id="dueDate" name="due_date" type="date" required />
            </label>
            <label class="full-width">
              <span>Purpose</span>
              <textarea id="purpose" name="purpose" rows="3"></textarea>
            </label>
            <label class="full-width">
              <span>Remarks</span>
              <textarea id="remarks" name="remarks" rows="2"></textarea>
            </label>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="submitButton" type="submit">
              Submit Request
            </button>
            <button class="btn btn-secondary" id="cancelButton" type="button">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
